
version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: food_order_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: food_order_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - food_order_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  activemq:
    image: apache/activemq-classic:5.18.3
    container_name: food_order_activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    networks:
      - food_order_net
    restart: on-failure
    environment:
      - ACTIVEMQ_OPTS=-Dcom.sun.management.jmxremote=false

  order-service:
    build: 
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order_service
    ports:
      - "8080:8080"
    environment:
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - ACTIVEMQ_HOST=activemq
      - ACTIVEMQ_PORT=61616
      - PAYMENT_SERVICE_HOST=payment-service
      - KITCHEN_SERVICE_HOST=kitchen-service
      - DELIVERY_SERVICE_HOST=delivery-service
      - spring.jpa.hibernate.ddl-auto=update
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy
      activemq:
        condition: service_started
    restart: on-failure

  payment-service:
    build: 
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment_service
    ports:
      - "8081:8081"
    environment:
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - spring.jpa.hibernate.ddl-auto=update
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  kitchen-service:
    build: 
      context: ./kitchen-service
      dockerfile: Dockerfile
    container_name: kitchen_service
    ports:
      - "8082:8082"
    environment:
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - spring.jpa.hibernate.ddl-auto=update
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  delivery-service:
    build: 
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: delivery_service
    ports:
      - "8083:8083"
    environment:
      - DATABASE_HOST=mysql
      - DATABASE_PORT=3306
      - DATABASE_USER=root
      - DATABASE_PASSWORD=root
      - spring.jpa.hibernate.ddl-auto=update
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend_app
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8080
    networks:
      - food_order_net
    depends_on:
      - order-service
    restart: on-failure

volumes:
  mysql_data:

networks:
  food_order_net:
    driver: bridge
