
services:
  mysql:
    image: mysql:8.0
    container_name: food_order_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: food_order_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - food_order_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  activemq:
    image: apache/activemq-classic:5.18.3
    container_name: food_order_activemq
    ports:
      - "61616:61616"
      - "8161:8161"
    networks:
      - food_order_net

  order-service:
    build: 
      context: ./order-service
      dockerfile: Dockerfile
    container_name: order_service
    ports:
      - "8080:8080"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql:3306/food_order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - spring.activemq.broker-url=tcp://activemq:61616
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy
      activemq:
        condition: service_started

  payment-service:
    build: 
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment_service
    ports:
      - "8081:8081"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql:3306/food_order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy

  kitchen-service:
    build: 
      context: ./kitchen-service
      dockerfile: Dockerfile
    container_name: kitchen_service
    ports:
      - "8082:8082"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql:3306/food_order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy

  delivery-service:
    build: 
      context: ./delivery-service
      dockerfile: Dockerfile
    container_name: delivery_service
    ports:
      - "8083:8083"
    environment:
      - spring.datasource.url=jdbc:mysql://mysql:3306/food_order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    networks:
      - food_order_net
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:

networks:
  food_order_net:
    driver: bridge
